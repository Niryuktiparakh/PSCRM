steps:
  # ── Backend ────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/pscrm-backend:$COMMIT_SHA"
      - ./backend

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    args:
      - push
      - "gcr.io/$PROJECT_ID/pscrm-backend:$COMMIT_SHA"
    waitFor: [build-backend]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pscrm-backend
      - --image=gcr.io/$PROJECT_ID/pscrm-backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=ENV=production
    waitFor: [push-backend]

  # ── Frontend ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/pscrm-frontend:$COMMIT_SHA"
      - --build-arg=VITE_API_BASE_URL=${_VITE_API_BASE_URL}
      - --build-arg=VITE_MAPBOX_TOKEN=${_VITE_MAPBOX_TOKEN}
      - --build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - --build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
      - --build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - --build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - --build-arg=VITE_GOOGLE_GEOCODING_API_KEY=${_VITE_GOOGLE_GEOCODING_API_KEY}
      - ./frontend
    waitFor: ["-"]  # build frontend in parallel with backend

  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    args:
      - push
      - "gcr.io/$PROJECT_ID/pscrm-frontend:$COMMIT_SHA"
    waitFor: [build-frontend]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pscrm-frontend
      - --image=gcr.io/$PROJECT_ID/pscrm-frontend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
    waitFor: [push-frontend]

substitutions:
  _VITE_API_BASE_URL: "https://pscrm-backend-HASH-el.a.run.app"
  _VITE_MAPBOX_TOKEN: ""
  _VITE_FIREBASE_API_KEY: ""
  _VITE_FIREBASE_AUTH_DOMAIN: ""
  _VITE_FIREBASE_PROJECT_ID: ""
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ""
  _VITE_FIREBASE_APP_ID: ""
  _VITE_GOOGLE_GEOCODING_API_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY
